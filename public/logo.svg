<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 351 239" role="img" aria-label="SITK Safety is the Key logo">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="6" stdDeviation="4" flood-color="#8a8a8a" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="yellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe72b"/>
      <stop offset="1" stop-color="#f6d400"/>
    </linearGradient>
  </defs>

  <g transform="translate(16 14) rotate(-8 160 105)" filter="url(#shadow)">
    <rect x="0" y="0" width="320" height="210" rx="38" fill="url(#yellow)"/>
    <rect x="0" y="0" width="320" height="210" rx="38" fill="none" stroke="#f2ca00" stroke-width="3"/>

    <text x="160" y="108" text-anchor="middle" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="98" letter-spacing="2" fill="#121212">SITK</text>
    <text x="297" y="102" text-anchor="start" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#121212">TM</text>

    <text x="160" y="158" text-anchor="middle" font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" font-size="32" letter-spacing="1" fill="#121212">SAFETY IS THE KEY</text>
  </g>
</svg>
